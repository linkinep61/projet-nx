name: Check upstream updates

on:
  schedule:
    # Vérifie tous les jours à 8h du matin (UTC)
    - cron: '0 8 * * *'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/streamflix-reborn/streamflix.git || true
          git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          # Commits dans upstream qui ne sont pas dans notre fork
          NEW_COMMITS=$(git log HEAD..upstream/main --oneline 2>/dev/null)

          if [ -z "$NEW_COMMITS" ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "Aucune mise à jour upstream."
          else
            COUNT=$(echo "$NEW_COMMITS" | wc -l)
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "commit_count=$COUNT" >> $GITHUB_OUTPUT

            # Sauvegarder les commits dans un fichier (max 50 lignes)
            echo "$NEW_COMMITS" | head -50 > /tmp/new_commits.txt

            # Résumé des fichiers modifiés
            git diff --stat HEAD..upstream/main | tail -1 > /tmp/diff_summary.txt
          fi

      - name: Create or update issue
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commits = fs.readFileSync('/tmp/new_commits.txt', 'utf8').trim();
            const diffSummary = fs.readFileSync('/tmp/diff_summary.txt', 'utf8').trim();
            const count = '${{ steps.check.outputs.commit_count }}';

            const title = `🔄 ${count} nouvelle(s) mise(s) à jour upstream disponible(s)`;
            const body = `## Mises à jour du projet principal (streamflix-reborn/streamflix)

**${count} commit(s)** en avance sur notre fork.

### Nouveaux commits :
\`\`\`
${commits}
\`\`\`

### Résumé des modifications :
\`\`\`
${diffSummary}
\`\`\`

### Actions possibles :
- **Intégrer tout** : \`git fetch upstream main && git merge upstream/main\`
- **Cherry-pick** : \`git cherry-pick <hash>\` pour choisir commit par commit
- **Ignorer** : Fermer cette issue

---
*Généré automatiquement par le workflow check-upstream*`;

            // Chercher une issue existante avec le même label
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-update',
              state: 'open'
            });

            if (existingIssues.data.length > 0) {
              // Mettre à jour l'issue existante
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                title: title,
                body: body
              });
              console.log(`Issue #${existingIssues.data[0].number} mise à jour.`);
            } else {
              // Créer une nouvelle issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['upstream-update']
              });
              console.log('Nouvelle issue créée.');
            }
