name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    env:
      # Mappé au niveau job pour pouvoir être testé dans un `if:` d'étape
      # (le contexte `secrets` n'est PAS accessible dans un `if:`, `env` oui).
      PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK environment
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Access Secrets
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          RABBITSTREAM_SOURCE_API: ${{ secrets.RABBITSTREAM_SOURCE_API }}
        run: |
          echo TMDB_API_KEY=$TMDB_API_KEY >> local.properties
          echo RABBITSTREAM_SOURCE_API=$RABBITSTREAM_SOURCE_API >> local.properties

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 -d > streamflix-release.jks

      - name: Inject version from Git tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "Injecting version $TAG from tag"
          # Calculate versionCode from tag parts: major*10000 + minor*100 + patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$TAG\"/" app/build.gradle
          echo "Set versionName=$TAG versionCode=$VERSION_CODE"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # Increase JVM heap for R8/D8 dexing (prevents OOM on 3rd build).
      # Le daemon Gradle reste actif entre les 3 builds pour réutiliser la JVM chaude.
      - name: Configure Gradle JVM memory
        run: |
          echo "" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> gradle.properties

      # --- 1. Universal build (mobile + TV), ARM ---
      # Remplace l'ancien APK mobile-only (redondant : l'universel embarque déjà les
      # deux lanceurs et route vers l'UI mobile ou TV selon l'appareil). ARM seul.
      - name: Set Universal layout (ARM)
        run: |
          echo APP_LAYOUT=default >> local.properties
          echo ABI_TARGET=arm >> local.properties

      - name: Build Universal APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign Universal APK
        id: sign_apk_universal
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keystorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      # 2026-07-17 : nommage rétrocompatible avec le sélecteur d'update embarqué
      # dans les VIEILLES apps déjà installées (impossible à patcher OTA) :
      #   - layout "default" (majorité mobile+TV) : sa branche else prend le 1er
      #     asset qui ne finit ni par "-mobile.apk" ni par "-tv.apk". L'ancien
      #     "-mobile-tv.apk" finissait par "-tv.apk" → exclu → elle tombait sur
      #     "-x86.apk" (crash "config package" sur ARM). On expose donc l'ARM
      #     universel sous "-universal.apk" (1er dans la liste = celui qu'elle prend).
      #   - layout "mobile" (hérité) : cherche "-mobile.apk" → on fournit une copie
      #     ARM identique sous ce nom.
      #   - layout "tv" : cherche "-tv.apk" → déjà couvert (ARM).
      # Même binaire ARM universel pour les 2 copies (universal + mobile).
      - name: Rename Universal APK
        run: |
          cp "${{ steps.sign_apk_universal.outputs.signedFile }}" "onyx-${{ github.ref_name }}-universal.apk"
          cp "${{ steps.sign_apk_universal.outputs.signedFile }}" "onyx-${{ github.ref_name }}-mobile.apk"

      # --- 2. TV build ---
      - name: Set TV layout
        run: |
          sed -i '/APP_LAYOUT/d;/ABI_TARGET/d' local.properties
          echo APP_LAYOUT=tv >> local.properties
          echo ABI_TARGET=arm >> local.properties

      # Nettoyage ciblé : supprime les outputs/manifestes/libs natifs mais
      # GARDE les classes compilées (identiques entre les 3 variantes).
      - name: Partial clean before TV build
        run: rm -rf app/build/outputs app/build/intermediates/merged_manifests app/build/intermediates/packaged_manifests app/build/intermediates/stripped_native_libs app/build/intermediates/merged_native_libs

      - name: Build TV APK
        run: ./gradlew assembleRelease --stacktrace --no-configuration-cache

      - name: Sign TV APK
        id: sign_apk_tv
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keystorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Rename TV APK
        run: |
          cp "${{ steps.sign_apk_tv.outputs.signedFile }}" "onyx-${{ github.ref_name }}-tv.apk"

      # --- 3. x86 build (universel mobile + TV, ABI x86/x86_64) ---
      # APK générique (même dispatcher que l'universel ARM → route mobile ou TV selon
      # l'appareil), mais compilé pour x86/x86_64 : émulateurs & TV Intel Atom. Étiqueté -x86.
      - name: Set x86 layout (universal + x86)
        run: |
          sed -i '/APP_LAYOUT/d;/ABI_TARGET/d' local.properties
          echo APP_LAYOUT=default >> local.properties
          echo ABI_TARGET=x86 >> local.properties

      - name: Partial clean before x86 build
        run: rm -rf app/build/outputs app/build/intermediates/merged_manifests app/build/intermediates/packaged_manifests app/build/intermediates/stripped_native_libs app/build/intermediates/merged_native_libs

      - name: Build x86 APK
        run: ./gradlew assembleRelease --stacktrace --no-configuration-cache

      - name: Sign x86 APK
        id: sign_apk_x86
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keystorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Rename x86 APK
        run: |
          cp "${{ steps.sign_apk_x86.outputs.signedFile }}" "onyx-${{ github.ref_name }}-x86.apk"

      # --- Upload all APKs to the existing release (projet-nx) ---
      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v2
        with:
          # ORDRE IMPORTANT : -universal.apk en PREMIER — les vieilles apps
          # layout "default" prennent le 1er asset non(-mobile/-tv) → doit être
          # l'ARM universel, pas x86.
          files: |
            onyx-${{ github.ref_name }}-universal.apk
            onyx-${{ github.ref_name }}-mobile.apk
            onyx-${{ github.ref_name }}-tv.apk
            onyx-${{ github.ref_name }}-x86.apk

      # --- Mirror the SAME APKs to the PUBLIC repo (warbix-prog/ONYX) ---
      # 2026-07-16 : publie automatiquement la release + les APKs sur le dépôt public
      #   de distribution. Nécessite un secret PUBLIC_REPO_TOKEN (PAT avec droit
      #   « Contents: write » sur warbix-prog/ONYX). Ne bloque pas le build si absent.
      - name: Publish APKs to public repo (warbix-prog/ONYX)
        if: ${{ env.PUBLIC_REPO_TOKEN != '' }}
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          repository: warbix-prog/ONYX
          token: ${{ env.PUBLIC_REPO_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ONYX ${{ github.ref_name }}
          body: |
            ONYX ${{ github.ref_name }}

            - `onyx-${{ github.ref_name }}-universal.apk` — Mobile + TV (ARM, recommandé)
            - `onyx-${{ github.ref_name }}-tv.apk` — Android TV (ARM)
            - `onyx-${{ github.ref_name }}-x86.apk` — Émulateurs / TV Intel (x86)
          files: |
            onyx-${{ github.ref_name }}-universal.apk
            onyx-${{ github.ref_name }}-mobile.apk
            onyx-${{ github.ref_name }}-tv.apk
            onyx-${{ github.ref_name }}-x86.apk
