name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK environment
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Access Secrets
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          RABBITSTREAM_SOURCE_API: ${{ secrets.RABBITSTREAM_SOURCE_API }}
        run: |
          echo TMDB_API_KEY=$TMDB_API_KEY >> local.properties
          echo RABBITSTREAM_SOURCE_API=$RABBITSTREAM_SOURCE_API >> local.properties

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 -d > streamflix-release.jks

      - name: Inject version from Git tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "Injecting version $TAG from tag"
          # Calculate versionCode from tag parts: major*10000 + minor*100 + patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$TAG\"/" app/build.gradle
          echo "Set versionName=$TAG versionCode=$VERSION_CODE"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # Increase JVM heap for R8/D8 dexing (prevents OOM on 3rd build)
      - name: Configure Gradle JVM memory
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

      # --- Default build (all layouts) ---
      - name: Build Default APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign Default APK
        id: sign_apk
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keystorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Rename Default APK
        run: |
          cp "${{ steps.sign_apk.outputs.signedFile }}" "streamflix-${{ github.ref_name }}.apk"

      # --- Mobile build ---
      - name: Set Mobile version
        run: echo APP_LAYOUT=mobile >> local.properties

      - name: Build Mobile APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign Mobile APK
        id: sign_apk_mobile
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keystorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Rename Mobile APK
        run: |
          cp "${{ steps.sign_apk_mobile.outputs.signedFile }}" "streamflix-${{ github.ref_name }}-mobile.apk"

      # --- TV build ---
      - name: Set TV version
        run: |
          sed -i '/APP_LAYOUT/d' local.properties
          echo APP_LAYOUT=tv >> local.properties

      - name: Clean before TV build
        run: ./gradlew clean

      - name: Build TV APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign TV APK
        id: sign_apk_tv
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keystorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Rename TV APK
        run: |
          cp "${{ steps.sign_apk_tv.outputs.signedFile }}" "streamflix-${{ github.ref_name }}-tv.apk"

      # --- Upload all APKs to the existing release ---
      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            streamflix-${{ github.ref_name }}.apk
            streamflix-${{ github.ref_name }}-mobile.apk
            streamflix-${{ github.ref_name }}-tv.apk
