name: refresh_wiflix

on:
  schedule:
    - cron: '17 */6 * * *'   # toutes les 6h
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh_wiflix
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright (Chromium)
        run: |
          pip install --quiet playwright
          python -m playwright install chromium --with-deps

      - name: Run Wiflix scraper (WARP + Playwright)
        run: python scripts/refresh_wiflix.py

      - name: Commit wiflix.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add provider_web/wiflix.json
          if git diff --cached --quiet; then
            echo "Pas de changement."
          else
            git commit -m "auto: refresh wiflix.json (WARP)"
            git push
          fi
