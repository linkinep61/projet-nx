# Workflow refresh_lumichat : teste EN AMONT toutes les chaines LumiChat via la passerelle,
#   ne garde que celles qui resolvent reellement (plus d'ecran noir cote app), et regenere
#   data-lumichat.m3u. L'app fetch ce M3U deja trie + regroupe les doublons en multi-serveurs.
name: refresh-lumichat
on:
  schedule:
    - cron: '0 */12 * * *'   # toutes les 12h
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: refresh-lumichat-only
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Probe LumiChat + regenerate M3U (vivantes seulement)
        env:
          LUMI_WORKERS: '25'
          LUMI_TIMEOUT: '30'
          LUMI_OUT: 'data-lumichat.m3u'
        run: python scripts/refresh_lumichat.py
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-lumichat.m3u
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: refresh data-lumichat.m3u (chaines vivantes testees)"
            git pull --rebase origin main || git rebase --abort
            git push
          fi
